name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    # Safe, non-secret placeholder values. The suite is hermetic (LLM/embedding
    # providers are mocked), and this recognized placeholder is treated as an
    # invalid key by validate_openai_key(), so no real credentials are ever used.
    env:
      OPENAI_API_KEY: your-openai-api-key-here

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend test suite
        # Mirrors the `make test-backend` target: tests import the `app.*`
        # package, so they must run from the backend/ working directory.
        working-directory: backend
        run: python -m pytest ../tests/ -v

  frontend-tests:
    name: Frontend tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend test suite
        # Mirrors the `make test-frontend` target (single, non-watch run).
        working-directory: frontend
        run: npm run test -- --run
