# Syx AGI Chatbot Framework - Docker Compose
# Run: make docker-data-dirs (once), then docker-compose up -d
# Config: mount .env at /app/.env (Option B); no secrets in image.

services:
  syx:
    build:
      context: .
      dockerfile: Dockerfile
    image: syx:latest
    container_name: syx
    ports:
      - "8000:8000"
    environment:
      - TZ=America/New_York
    volumes:
      # Option B: mount .env into container (read-only)
      - ./.env:/app/.env:ro
      # Bind mounts for persistence (create dirs with: make docker-data-dirs)
      - ./data/memory:/app/data/memory
      - ./data/db:/app/data/db
      - ./runtime/logs:/app/runtime/logs
      - ./runtime/runs:/app/runtime/runs
      - ./runtime/state:/app/runtime/state
      # Persist the Hugging Face cache so the sentence-transformers model
      # (e.g. BAAI/bge-m3, ~2.3 GB) is downloaded once and reused across restarts.
      - ./data/hf-cache:/root/.cache/huggingface
    restart: unless-stopped
